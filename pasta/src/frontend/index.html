<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Pasta</title>
<link rel="stylesheet" href="style.css">
</head>
<!-- Frameless translucent palette (see tinyjs.json "chrome"): the body is
     transparent so the vibrancy material shows through. The header doubles
     as the drag handle; the search field opts out automatically because
     interactive elements are excluded from drag regions. -->
<body>

<div class="palette">

  <header data-tiny-drag>
    <span class="logo">🍝</span>
    <input id="search" type="text" placeholder="Search clipboard history…"
      spellcheck="false" autocomplete="off">
    <button id="pick" class="pick" title="Pick a colour from anywhere on screen">🎨</button>
    <span id="paused" class="paused" hidden>capture paused</span>
  </header>

  <ul id="list"><!-- rows injected by app.js --></ul>

  <div id="empty" class="empty" hidden>
    <div class="empty-icon">📋</div>
    <div id="emptyText">Copy something — it shows up here.</div>
  </div>

  <!-- Full-size image preview, over the list. The Back bar is pinned on top. -->
  <div id="preview" class="preview" hidden>
    <div class="preview-bar" data-tiny-drag>
      <button id="pvBack" class="pv-back">← Back</button>
      <div class="pv-spacer"></div>
      <button id="pvCopy" class="pv-copy">Copy</button>
    </div>
    <div class="preview-body"><img id="pvImg" alt=""></div>
    <div id="pvMeta" class="preview-meta"></div>
  </div>

  <footer>
    <span id="count">0 clips</span>
    <span class="keys">
      <kbd>⏎</kbd> copy · <kbd>⌥⏎</kbd> paste · <kbd>⌘P</kbd> pin · <kbd>⌘⌫</kbd> delete · <kbd>esc</kbd> close
    </span>
  </footer>

</div>

<script src="app.js"></script>
</body>
</html>
