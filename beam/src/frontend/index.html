<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Beam</title>
<link rel="stylesheet" href="style.css">
</head>
<!-- Frameless translucent palette (see tinyjs.json "chrome"): the body is
     transparent so the vibrancy material shows through. The header doubles
     as the drag handle; the search field opts out automatically because
     interactive elements are excluded from drag regions. -->
<body>

<div class="palette">

  <header data-tiny-drag>
    <span class="logo">⚡️</span>
    <input id="search" type="text" placeholder="Search apps, files… or type math"
      spellcheck="false" autocomplete="off">
    <kbd id="hotkey" class="hotkey">⌥Space</kbd>
  </header>

  <ul id="list"><!-- rows injected by app.js --></ul>

  <div id="empty" class="empty" hidden>
    <div class="empty-icon">⚡️</div>
    <div id="emptyText">No matches.</div>
  </div>

  <footer>
    <span id="status">…</span>
    <span class="keys">
      <kbd>↑↓</kbd> select · <kbd>⏎</kbd> open · <kbd>⌘⏎</kbd> reveal · <kbd>esc</kbd> close
    </span>
  </footer>

</div>

<script src="logic.js"></script>
<script src="app.js"></script>
</body>
</html>
