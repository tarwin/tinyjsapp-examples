<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Kraa 3D</title>
<link rel="stylesheet" href="style.css">
</head>
<body data-state="idle">

<div id="stage">
  <div id="bubble"></div>
  <div id="fx"></div>
  <canvas id="cv" width="200" height="200"></canvas>
  <div id="shadow"></div>

<!-- three.js + GLTFLoader, bundled to one classic script (no modules, no CDN) -->

<script src="kraa-sound.js"></script>
<script src="app.js"></script>
</body>
</html>
