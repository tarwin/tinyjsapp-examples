<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Tomato</title>
<link rel="stylesheet" href="style.css">
</head>
<!-- The window is transparent + frameless (see tinyjs.json "chrome"), so only
     the tomato paints — the square corners show the desktop straight through.
     The whole stage is a drag handle; buttons opt out with data-tiny-nodrag. -->
<body>

<div class="stage" data-tiny-drag data-mood="idle" data-phase="focus" id="stage">

  <!-- calyx: the little green crown + stem sprouting from the top -->
  <svg class="calyx" viewBox="0 0 80 46" aria-hidden="true">
    <rect x="37" y="0" width="6" height="16" rx="3" fill="#5a7d33"/>
    <g fill="#6fa53c">
      <path d="M40 30 C 22 34, 10 26, 6 16 C 22 14, 34 20, 40 30 Z"/>
      <path d="M40 30 C 58 34, 70 26, 74 16 C 58 14, 46 20, 40 30 Z"/>
      <path d="M40 32 C 30 40, 16 40, 8 34 C 20 28, 32 28, 40 32 Z"/>
      <path d="M40 32 C 50 40, 64 40, 72 34 C 60 28, 48 28, 40 32 Z"/>
      <path d="M40 26 C 36 14, 40 4, 40 4 C 40 4, 44 14, 40 26 Z"/>
    </g>
  </svg>

  <!-- ring = progress; tomato = the body; face = the silly bits -->
  <div class="ring" id="ring">
    <div class="tomato">
      <div class="shine"></div>
      <div class="face">
        <div class="eyes">
          <span class="eye"><span class="pupil"></span></span>
          <span class="eye"><span class="pupil"></span></span>
        </div>
        <div class="time" id="time">25:00</div>
        <div class="mouth"></div>
      </div>
    </div>
  </div>

  <div class="phase" id="phase">Focus</div>

  <div class="controls" data-tiny-nodrag>
    <button id="reset" title="Reset">&#8635;</button>
    <button id="toggle" class="primary" title="Start / Pause">&#9654;</button>
    <button id="skip" title="Skip">&#8677;</button>
  </div>

</div>

<script src="tiny.js"></script>
<script src="app.js"></script>
</body>
</html>
