<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="style.css">
<script>
  // no browser right-click menu in tinyjs apps — text fields keep theirs
  addEventListener('contextmenu', (e) => {
    if (!e.target.closest('input, textarea, [contenteditable]')) e.preventDefault();
  });
</script>
</head>
<body>
  <header data-tiny-drag>
    <div class="dots">
      <button class="dot close" id="dotClose" title="Close"></button>
      <button class="dot mini" id="dotMini" title="Minimize"></button>
    </div>
    <div class="brand">
      <h1>Shelf</h1>
      <span id="sub">the tinyjs fleet</span>
    </div>
    <div class="src" id="src" title="where the catalog came from"></div>
    <button id="refresh" title="Refresh the catalog from GitHub">⟳</button>
  </header>
  <nav id="tabs">
    <button data-tab="all">All</button>
    <button data-tab="installed">Installed</button>
  </nav>
  <div id="selfup" class="selfup" hidden></div>
  <main id="list">
    <!-- static placeholder: on screen from first paint until boot()'s first
         render() wipes #list — without it the shelf area sits blank while the
         webview boots and the backend answers the first RPCs -->
    <div class="loading"><span class="loading-spin"></span>Stocking the shelves…</div>
  </main>
  <footer>
    <span id="counts"></span>
    <a href="#" id="repo">tarwin/tinyjsapp-examples</a>
  </footer>
  <script src="tiny.js"></script>
  <script src="catalog.js"></script>
  <script src="app.js"></script>
</body>
</html>
