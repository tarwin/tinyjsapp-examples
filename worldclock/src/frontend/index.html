<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>World Clock</title>
<link rel="stylesheet" href="style.css">
</head>
<!-- Frameless window with the macOS "popover" vibrancy material (see
     tinyjs.json "chrome"): the body is transparent so the translucent panel
     shows the desktop blurred behind it. The header is a drag handle; the
     buttons and rows opt out with data-tiny-nodrag. -->
<body>

<div class="panel">

  <header data-tiny-drag>
    <div class="title">
      <span class="globe">🌍</span>
      <span>World Clock</span>
    </div>
    <div class="tools" data-tiny-nodrag>
      <button id="cycle" title="Pause / resume cycling">⏸</button>
      <button id="fmt" title="Toggle 12 / 24-hour">24h</button>
    </div>
  </header>

  <ul id="list" class="list"><!-- rows injected by app.js --></ul>

  <footer>
    <span id="hint">Click a city to make it Home</span>
  </footer>

</div>

<script src="tiny.js"></script>
<script src="app.js"></script>
</body>
</html>
