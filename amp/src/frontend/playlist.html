<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>amp — playlist</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="chassis">
  <div class="titlebar">
    <span class="tt">Playlist Editor</span>
    <span class="shade-only" id="plShade">no track</span>
    <button class="wbtn" id="close" title="Close">×</button>
  </div>

  <ul class="pl" id="list"></ul>
  <div class="pl-empty" id="empty">Drop audio here, or press <b>+ Add</b>.</div>

  <div class="pl-foot">
    <button class="btn sm" id="add">+ Add</button>
    <button class="btn sm" id="clear">Clear</button>
    <span class="sep"></span>
    <span class="count seg dim" id="count">0 tracks</span>
  </div>
</div>
<script src="drag.js"></script>
<script src="playlist.js"></script>
</body>
</html>
