<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Nib</title>
<style>
  /* The Welcome window — the app's one fixed window ('main'). Closing it
     hides it (setHideOnClose); it comes back via Window ▸ Welcome, or on its
     own when the last document window closes. */

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f4f4f6; --panel: #ffffff; --line: #dcdce2;
    --fg: #33343c; --dim: #8b8d99; --accent: #4a6bdf; --accent2: #3a55b8;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #26272e; --panel: #1e1f26; --line: #3a3b45;
      --fg: #d6d8e0; --dim: #83859a; --accent: #7d96ec; --accent2: #93a8f0;
    }
  }

  html, body { height: 100%; overflow: hidden; }
  body {
    display: flex; flex-direction: column;
    background: var(--bg); color: var(--fg);
    font: 13px -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-user-select: none; user-select: none;
  }
  body.dropping { outline: 3px solid var(--accent); outline-offset: -3px; }

  #hero { text-align: center; padding: 26px 20px 18px; flex: none; }
  #hero svg { width: 44px; height: 44px; }
  #hero h1 { font-size: 21px; font-weight: 650; margin-top: 6px; }
  #hero p { font-size: 12px; color: var(--dim); margin-top: 3px; }

  #actions { display: flex; gap: 10px; justify-content: center; padding-bottom: 16px; flex: none; }
  #actions button {
    font: 12.5px -apple-system, sans-serif; font-weight: 500;
    border: 1px solid var(--line); border-radius: 8px;
    background: var(--panel); color: var(--fg);
    padding: 7px 16px;
  }
  #actions button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  #actions button span { opacity: .55; font-weight: 400; margin-left: 6px; font-size: 11px; }

  #draftCard {
    margin: 0 18px 12px; padding: 10px 14px; flex: none;
    display: flex; align-items: center; gap: 10px;
    background: var(--panel); border: 1px solid var(--accent); border-radius: 10px;
    font-size: 12px;
  }
  #draftCard b { font-weight: 600; }
  #draftCard .flex { flex: 1; }
  #draftCard button {
    font: 11.5px -apple-system, sans-serif; color: #fff;
    background: var(--accent); border: none; border-radius: 6px; padding: 4px 12px;
  }

  #recents { flex: 1; overflow-y: auto; padding: 0 18px 16px; }
  #recents h2 {
    font-size: 11px; font-weight: 600; color: var(--dim);
    text-transform: uppercase; letter-spacing: .05em; margin: 4px 2px 8px;
  }
  .recent {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 8px; cursor: default;
  }
  .recent:hover { background: var(--panel); }
  .recent .icon { font-size: 17px; }
  .recent .names { flex: 1; min-width: 0; }
  .recent .name { font-size: 12.5px; font-weight: 500; }
  .recent .dir {
    font-size: 11px; color: var(--dim);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .recent .x { color: var(--dim); font-size: 12px; padding: 4px 6px; visibility: hidden; }
  .recent:hover .x { visibility: visible; }
  .recent.gone { opacity: .45; }
  .recent.gone .name::after { content: "  (moved or deleted)"; font-weight: 400; color: var(--dim); }

  #empty { text-align: center; color: var(--dim); font-size: 12px; padding: 26px 0; }
</style>
</head>
<body>

<div id="hero">
  <svg viewBox="0 0 48 48" fill="none">
    <path d="M24 45 C17 36 10 27.5 10 18.5 A14 13.5 0 0 1 38 18.5 C38 27.5 31 36 24 45 Z"
          fill="var(--accent)" opacity=".92"/>
    <path d="M24 41 L24 25" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
    <circle cx="24" cy="20.5" r="2.6" fill="#fff"/>
  </svg>
  <h1>Nib</h1>
  <p>A tiny Markdown editor — drop a .md file anywhere in this window</p>
</div>

<div id="actions">
  <button id="btnNew" class="primary">New Document<span>⌘N</span></button>
  <button id="btnOpen">Open…<span>⌘O</span></button>
</div>

<div id="draftCard" hidden>
  <span>📝</span>
  <span><b>Unsaved draft</b> from a closed untitled window</span>
  <span class="flex"></span>
  <button id="btnDraft">Restore</button>
</div>

<div id="recents"></div>

<script>
(async () => {
  const $ = (id) => document.getElementById(id);

  function paint(p) {
    $('draftCard').hidden = !p.untitledDraft;

    const box = $('recents');
    box.textContent = '';
    if (!p.recents.length) {
      box.insertAdjacentHTML('beforeend', '<div id="empty">Files you open will show up here.</div>');
      return;
    }
    const h = document.createElement('h2');
    h.textContent = 'Recent';
    box.appendChild(h);

    for (const r of p.recents) {
      const row = document.createElement('div');
      row.className = 'recent' + (r.exists ? '' : ' gone');
      const slash = r.path.lastIndexOf('/');

      const icon = document.createElement('span');
      icon.className = 'icon';
      icon.textContent = '📄';
      const names = document.createElement('div');
      names.className = 'names';
      const name = document.createElement('div');
      name.className = 'name';
      name.textContent = r.path.slice(slash + 1);
      const dir = document.createElement('div');
      dir.className = 'dir';
      dir.textContent = r.path.slice(0, slash).replace(/^\/Users\/[^/]+/, '~');
      names.append(name, dir);
      const x = document.createElement('span');
      x.className = 'x';
      x.textContent = '✕';
      x.title = 'Remove from list';
      x.onclick = (e) => {
        e.stopPropagation();
        tiny.api.call('removeRecent', { path: r.path });
      };
      row.append(icon, names, x);
      row.onclick = () => {
        if (r.exists) tiny.api.call('openPaths', { paths: [r.path] });
        else tiny.api.call('removeRecent', { path: r.path });
      };
      box.appendChild(row);
    }
  }

  $('btnNew').onclick = () => tiny.api.call('newDoc');
  $('btnOpen').onclick = async () => {
    const picks = await tiny.win.openFiles();
    if (picks) tiny.api.call('openPaths', { paths: picks });
  };
  $('btnDraft').onclick = () => tiny.api.call('restoreUntitled');

  // menus broadcast to every window; act only when we're the key window
  tiny.menu.on(async (id) => {
    if (!document.hasFocus()) return;
    if (id === 'new') tiny.api.call('newDoc');
    else if (id === 'open') $('btnOpen').onclick();
  });

  // .md files land here from Finder too (Dock icon, double-click)
  tiny.win.onDrop((paths) => tiny.api.call('openPaths', { paths }));
  tiny.app.onOpenFiles(() => {});      // backend's onOpenFiles does the work

  document.addEventListener('dragover', () => document.body.classList.add('dropping'));
  document.addEventListener('dragleave', () => document.body.classList.remove('dropping'));
  document.addEventListener('drop', () => document.body.classList.remove('dropping'));

  tiny.api.on('welcome', paint);
  paint(await tiny.api.call('boot'));
})();
</script>
</body>
</html>
